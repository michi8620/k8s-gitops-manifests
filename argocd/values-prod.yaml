argo-cd:
  server:
    replicas: 2
    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: argocd.prod.example.com
      tls: true
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        memory: 512Mi

  controller:
    replicas: 2                                  # HA mode
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 1Gi

  repoServer:
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        memory: 512Mi

  redis-ha:
    enabled: true                                # HA Redis for production

  configs:
    params:
      timeout.reconciliation: 180s
