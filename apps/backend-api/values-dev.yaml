backend-api:
  image:
    tag: "dev-latest"

  replicaCount: 1

  ingress:
    hosts:
      - host: api.dev.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-dev-tls
        hosts:
          - api.dev.example.com

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  env:
    - name: LOG_LEVEL
      value: debug
    - name: DB_HOST
      value: postgres.dev.internal
