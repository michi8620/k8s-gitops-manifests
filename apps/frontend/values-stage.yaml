frontend:
  image:
    tag: "stage-latest"

  replicaCount: 2

  ingress:
    hosts:
      - host: frontend.stage.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-stage-tls
        hosts:
          - frontend.stage.example.com

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
