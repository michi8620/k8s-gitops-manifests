frontend:
  replicaCount: 1

  image:
    repository: ghcr.io/OWNER/frontend
    tag: "latest"                                # Overridden per environment
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: ca-issuer

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  livenessProbe:
    httpGet:
      path: /healthz
      port: http

  readinessProbe:
    httpGet:
      path: /ready
      port: http
