frontend:
  image:
    tag: "1.0.0"                                 # Pinned version in prod

  replicaCount: 3

  ingress:
    hosts:
      - host: frontend.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-prod-tls
        hosts:
          - frontend.example.com

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

  podDisruptionBudget:
    minAvailable: 2
